services:
  db:
    image: pgvector/pgvector:pg16
    container_name: productDB
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: root1234
      POSTGRES_DB: productAI
    ports:
      - "5432:5432"
    volumes:
      - ./app/db/init.sql:/docker-entrypoint-initdb.d/init.sql